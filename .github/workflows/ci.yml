name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  homepage-fragment-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Landing report matches homepage practice fragment
        run: ./scripts/check-homepage-practice-fragment-sync.sh

  rust-lib:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux system dependencies
        # Tauri 2's lib pulls in webkit2gtk-sys / glib-sys / gobject-sys
        # at link time even for `cargo test --lib`. Without these, the
        # rust-lib job fails with: "system library `glib-2.0` was not found".
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            pkg-config \
            build-essential

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo test (library — includes substrate atlas v2 audit)
        run: cargo test --lib
