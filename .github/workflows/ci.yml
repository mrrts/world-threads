name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  homepage-fragment-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: README + landing match homepage practice fragment
        run: ./scripts/check-homepage-practice-fragment-sync.sh

  rust-lib:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cargo test (library — includes substrate atlas v2 audit)
        run: cargo test --lib
